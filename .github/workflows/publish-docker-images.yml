name: publish-docker-images
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    name: docker-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Src Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          fetch-tags: true
          persist-credentials: false

      - name: write tags env vars
        run: |
          TAG=$(git describe --tags)
          LATEST_TAG=$(git tag -l | grep -viE '(alpha|beta)' | sort -V | tail -n 1)
          GITHASH="$(git rev-parse HEAD)"
          echo "TAG=$TAG"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "LATEST_TAG=${LATEST_TAG}"
          echo "LATEST_TAG=${LATEST_TAG}" >> "$GITHUB_ENV"
          echo "GITHASH=${GITHASH}"
          echo "GITHASH=${GITHASH}" >> "$GITHUB_ENV"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            cactus4docker/go-camo
            ghcr.io/cactus/go-camo
          tags: |
            # set latest tag for master branch
            type=raw,value=${{ env.TAG }}
            type=raw,value=latest,enable=${{ env.TAG == env.LATEST_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          password: ${{ secrets.DOCKER_PASSWORD }}
          username: ${{ secrets.DOCKER_USERNAME }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          build-args: |
            GITHASH=${{env.GITHASH}}
            APP_VER=${{env.TAG}}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
